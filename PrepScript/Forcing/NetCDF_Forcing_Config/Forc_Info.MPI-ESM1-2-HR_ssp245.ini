#--------------------------------------------------------------------
# CRESM_Forcing.ini 
# 由 Omarjan 创建于 2025-09-28
#    仅用于基于 netcdf 强迫数据的 CRESM 强迫数据准备
#    请确保数据格式正确，并且在本文件中正确定义变量。
#
#    每个 [section] 定义一个变量，section 的名称即为“标准名称”。
#    VarNameInData : 
#        原始 netcdf 文件中的变量名，同时也必须出现在文件名中
#    LevelType: 
#        变量的层类型，可以是 'plevel'（压力层）、'surface'（地表）、'soillevel'（土壤层）、'depthlevel'（深度层）
#    Dimensions:
#        变量的维度，数据必须包含 'lat'、'lon'，
#        如果 LevelType 是 'plevel'，则数据必须包含 'lev' 或 'level'
#        如果 LevelType 是 'soillevel'，则数据必须包含 'depth' 或 'soil'
#    TemporalRes:
#        变量的时间分辨率，可以是 '1H'、'3H'、'6H'、'12H'、'1D'、'1M'、'1Y'、'const' 等
#    Description:
#        对变量的简要描述
#
#
#    atmosphere hybrid sigma pressure coordinate
#    formula = "p = ap + b*ps"
#--------------------------------------------------------------------


[BaseInfo]
ForcingDataName  = MPI-ESM1-2-HR_ssp245
DataDir          = /tera07/zhangsl/wumej22/Omarjan/CRESM_Forcing/MPI_ESM1/ssp245
FileIndex        = File_Index.MPI-ESM1-2-HR_ssp245.csv
DataStart        = 2015-01-01_06
DataEnd          = 2055-01-01_00
ModelTimeStep    = 21600                       # in seconds
LevelDefineAt    = hybrid-level                # 'pressure-level' or 'hybrid-level'
LevelDirections  = bottom-to-top               
atm3D            = U,V,T,Q
atm2D            = U10,V10,T2,Q2,PS,SLP
land             = SST,TSOIL,MSOIL
const            = LAND,SOILHGT
Dim_time         = time
Dim_lev          = lev
Dim_depth        = depth
Dim_lat          = lat
Dim_lon          = lon



#************************************
# atmospheric variables (3D)
#************************************
[U]
VarNameInData    = ua
LevelType        = atmospheric
Dimensions       = time,lev,lat,lon
TemporalRes      = 6H
Description      = Zonal Wind Speed
Unit             = m/s                                       

[V]
VarNameInData    = va
LevelType        = atmospheric
Dimensions       = time,lev,lat,lon
TemporalRes      = 6H
Description      = Meridional Wind Speed
Unit             = m/s                                        

[T]
VarNameInData    = ta
LevelType        = atmospheric
Dimensions       = time,lev,lat,lon
TemporalRes      = 6H
Description      = Air Temperature
Unit             = K                                          

[Q]
VarNameInData    = hus
LevelType        = atmospheric
Dimensions       = time,lev,lat,lon
TemporalRes      = 6H
Description      = Specific Humidity
Unit             = kg/kg                                    

#************************************
# atmospheric variables (2D)
#************************************
[U10]
VarNameInData    = uas
LevelType        = surface
Dimensions       = time,lat,lon
TemporalRes      = 6H
Description      = 10m Zonal Wind Speed
Unit             = m/s                                         

[V10]
VarNameInData    = vas
LevelType        = surface
Dimensions       = time,lat,lon
TemporalRes      = 6H
Description      = 10m Meridional Wind Speed
Unit             = m/s                                          

[T2]
VarNameInData    = tas
LevelType        = surface
Dimensions       = time,lat,lon
TemporalRes      = 6H
Description      = 2m Air Temperature
Unit             = K                                           

[Q2]
VarNameInData    = huss
LevelType        = surface
Dimensions       = time,lat,lon
TemporalRes      = 6H
Description      = 2m Specific Humidity
Unit             = kg/kg                                      

[PS]
VarNameInData    = ps
LevelType        = surface
Dimensions       = time,lat,lon
TemporalRes      = 6H
Description      = Surface Pressure
Unit             = Pa                                       

[SLP]
VarNameInData    = psl
LevelType        = surface
Dimensions       = time,lat,lon
TemporalRes      = 6H
Description      = Sea Level Pressure
Unit             = Pa                                       

#************************************
# land variables
#************************************
[SST]
VarNameInData    = ts
LevelType        = surface
Dimensions       = time,lat,lon
TemporalRes      = 6H
Description      = Sea Surface Temperature
Unit             = K                                          

[TSOIL]
VarNameInData    = tsl
LevelType        = soillevel
Dimensions       = time,depth,lat,lon
TemporalRes      = 1M
Description      = Soil Temperature
Unit             = K                                          

[MSOIL]
VarNameInData    = mrsol
LevelType        = soillevel
Dimensions       = time,depth,lat,lon
TemporalRes      = 1M
Description      = Total Water Content of Soil Layer
Unit             = kg/m2                                      

#************************************
# Const variables
#************************************
[LAND]
VarNameInData    = sftlf
LevelType        = surface
Dimensions       = lat,lon
TemporalRes      = const
Description      = Land Fraction
Unit             = fraction                                     # 0=ocean; >0=land

[SOILHGT]
VarNameInData    = orog
LevelType        = surface
Dimensions       = lat,lon
TemporalRes      = const
Description      = Soil Height
Unit             = m                                           

